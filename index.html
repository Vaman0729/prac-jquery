<script>
let items = ["Apple","Banana","Mango","Orange","Grapes","Pineapple"];

function search() {
    let query = document.getElementById("search").value.toLowerCase();
    let output = "";
    let count = 0;

    for (let i = 0; i < items.length; i++) {
        if (items[i].toLowerCase().includes(query)) {
            output += "<div>" + items[i] + "</div>";
            count++;
            if (count == 3) break;
        }
    }

    document.getElementById("suggestions").innerHTML = output;
}
</script>
