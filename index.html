<!DOCTYPE html>
<html>
<head>
    <title>AJAX Search Suggestion</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: lightblue;
        }
        input {
            padding: 10px;
            width: 250px;
        }
        #suggestions {
            border: 1px solid black;
            width: 250px;
            margin: auto;
            background: white;
        }
        .item {
            padding: 5px;
            cursor: pointer;
        }
        .item:hover {
            background-color: lightgray;
        }
    </style>
</head>
<body>

<h2>Search Suggestion</h2>

<input type="text" id="search" placeholder="Type to search...">
<div id="suggestions"></div>

<script>
$(document).ready(function() {

    $("#search").keyup(function() {
        let query = $(this).val();

        if (query != "") {
            $.ajax({
                url: "data.txt",   // file to fetch data
                method: "GET",
                success: function(data) {

                    let items = data.split(",");
                    let output = "";

                    items.forEach(function(item) {
                        if (item.toLowerCase().includes(query.toLowerCase())) {
                            output += "<div class='item'>" + item + "</div>";
                        }
                    });

                    $("#suggestions").html(output);
                }
            });
        } else {
            $("#suggestions").html("");
        }
    });

});
</script>

</body>
</html>
